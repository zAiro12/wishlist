<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>🎁 Wishlist — Share your wishes</title>
    <meta name="description" content="Share your wishlist with friends and family. Free, simple and private." />
    <meta name="theme-color" content="#6366f1" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/wishlist/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/wishlist/favicon.png" />
    <link rel="apple-touch-icon" href="/wishlist/favicon.png" />
    <link rel="manifest" href="/wishlist/site.webmanifest" />

    <!-- Open Graph (WhatsApp, Telegram, Facebook, iMessage) -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://zairo12.github.io/wishlist/" />
    <meta property="og:title"        content="🎁 Wishlist — Share your wishes" />
    <meta property="og:description" content="Share your wishlist with friends and family. Free, simple and private." />
    <meta property="og:image"        content="/wishlist/og-image.png" />

    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
